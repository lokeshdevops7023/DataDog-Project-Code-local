apiVersion: apps/v1
kind: Deployment
metadata:
  name: venu-hamesh-urmila-deployment
  labels:
    app: nginx
spec:
  replicas: 15 # Desired number of Pod replicas
  selector:
    matchLabels:
      app: nginx
  template:
    metadata:
      labels:
        app: nginx
    spec:
      containers:
      - name: nginx
        image: nginx:latest # Container image to use
        ports:
        - containerPort: 80 # Port exposed by the container
